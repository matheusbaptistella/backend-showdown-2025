services:
  nginx:
    image: nginx:1.29.0-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      # - api2
    ports:
      - "9999:9999"
    network:
      - backend
      - payment-processor

  api1: &api
    build:
      context: .
      target: final
    hostname:
      - api1
    environment:
      - APP_PORT=8080
      - REDIS_URL=redis:6379
      - PROCESSOR_DEFAULT_URL=http://payment-processor-default:8080
      - PROCESSOR_FALLBACK_URL=http://payment-processor-fallback:8080
    networks:
      - backend
      - payment-processor
    depends_on:
      redis:
        condition: service_healthy

  # api2:
  #   <<: *api
  #   hostname: api2
  #   environment:
  #       - APP_PORT=8080
  #       - REDIS_URL=redis:6379
  #       - PROCESSOR_DEFAULT_URL=http://payment-processor-default:8080
  #       - PROCESSOR_FALLBACK_URL=http://payment-processor-fallback:8080

  redis:
    image: redis:8.0.3-alpine
    container_name: rinha-redis
    command: redis-server --save "" --appendonly no --maxclients 20000
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true
